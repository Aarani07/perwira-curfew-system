<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Perwira Curfew System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="app-container">

    <!-- ANIMATED BACKGROUND -->
    <div class="bg-animation">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <!-- LOGIN -->
    <div class="login-wrapper">
        <div class="login-card">

            <div class="logo">
                <i class="fa-solid fa-lock"></i>
            </div>

            <h1 class="system-title">Perwira Curfew System</h1>
            <p class="system-subtitle">Secure Access Portal</p>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">

                <div class="input-box">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-box password-wrapper">
                    <label>Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
                </div>

                <!-- GOOGLE reCAPTCHA -->
                <div class="captcha-wrapper">
                    <div class="g-recaptcha"
                        data-sitekey="6LdZ6PQsAAAAAHC0fQ-WXRDjVl3N02aETg6Fxrvp">
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    Login
                </button>

                <!-- FORGOT PASSWORD -->
                <div class="forgot-wrapper">
                    <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
/* SHOW / HIDE PASSWORD */
const togglePassword = document.getElementById("togglePassword");
const passwordField = document.getElementById("password");

togglePassword.addEventListener("click", () => {
    const type = passwordField.type === "password" ? "text" : "password";
    passwordField.type = type;

    togglePassword.classList.toggle("fa-eye");
    togglePassword.classList.toggle("fa-eye-slash");
});
</script>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>
</body>
</html>
